<div id="app"></div>
<style>
  #app {
    --ink: #0B1220;
    --steel: #3A4552;
    --steel-light: #5C6B7A;
    --brass: #C89B3C;
    --brass-light: #E3C878;
    --green: #4C9A6A;
    --red: #B5544A;
    --paper: #EDE7DA;
    --paper-dim: #C9C2B2;

    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--ink);
    color: var(--paper);
    min-height: 100vh;
    padding: 32px 16px 60px;
    box-sizing: border-box;
    display: flex;
    justify-content: center;
  }
  #app * { box-sizing: border-box; }
  .wrap { width: 100%; max-width: 460px; }

  .eyebrow {
    font-family: 'SF Mono', ui-monospace, Menlo, monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--brass-light);
    margin: 0 0 6px;
  }
  h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 400;
    font-size: 30px;
    margin: 0 0 28px;
    color: var(--paper);
    letter-spacing: 0.01em;
  }
  h1 span { color: var(--brass-light); font-style: italic; }

  .card {
    background: #131C29;
    border: 1px solid #232F3F;
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--steel-light);
    margin-bottom: 8px;
  }
  input[type=text], input[type=number] {
    width: 100%;
    background: #0E1622;
    border: 1px solid #2A3646;
    border-radius: 6px;
    padding: 12px 14px;
    color: var(--paper);
    font-size: 15px;
    margin-bottom: 18px;
    font-family: inherit;
  }
  input:focus { outline: none; border-color: var(--brass); }

  .toggle-row { display: flex; gap: 10px; margin-bottom: 18px; }
  .toggle {
    flex: 1;
    text-align: center;
    padding: 10px;
    border: 1px solid #2A3646;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    color: var(--steel-light);
    transition: all 0.15s;
  }
  .toggle.active {
    border-color: var(--brass);
    color: var(--brass-light);
    background: rgba(200,155,60,0.08);
  }

  button.primary {
    width: 100%;
    background: var(--brass);
    color: #1A1200;
    border: none;
    border-radius: 6px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  button.primary:hover { background: var(--brass-light); }
  button.ghost {
    width: 100%;
    background: transparent;
    color: var(--steel-light);
    border: 1px solid #2A3646;
    border-radius: 6px;
    padding: 10px;
    font-size: 13px;
    cursor: pointer;
    margin-top: 8px;
    font-family: inherit;
  }
  button.ghost:hover { border-color: var(--brass); color: var(--brass-light); }

  /* vault dial */
  .dial-wrap { display: flex; justify-content: center; margin-bottom: 8px; }
  .dial-caption {
    text-align: center;
    font-family: 'SF Mono', ui-monospace, monospace;
    font-size: 13px;
    color: var(--steel-light);
    margin-bottom: 20px;
  }
  .stake-amount {
    font-family: Georgia, serif;
    font-size: 44px;
    text-align: center;
    color: var(--brass-light);
    margin: 4px 0 2px;
  }
  .stake-label {
    text-align: center;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--steel-light);
    margin-bottom: 24px;
  }

  .task {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid #202B3A;
  }
  .task:last-child { border-bottom: none; }
  .check {
    width: 22px; height: 22px;
    border-radius: 5px;
    border: 2px solid var(--steel-light);
    flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .check.done { background: var(--green); border-color: var(--green); }
  .check svg { width: 14px; height: 14px; }
  .task-name { flex: 1; font-size: 14.5px; }
  .task-name.done { text-decoration: line-through; color: var(--steel-light); }
  .task-diff {
    font-family: 'SF Mono', ui-monospace, monospace;
    font-size: 10.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 4px;
    color: var(--steel-light);
    border: 1px solid #2A3646;
  }

  .add-task-row { display: flex; gap: 8px; margin-top: 16px; }
  .add-task-row input { margin-bottom: 0; flex: 1; }
  .add-task-row button {
    background: #1D2836;
    color: var(--brass-light);
    border: 1px solid #2A3646;
    border-radius: 6px;
    padding: 0 16px;
    cursor: pointer;
    font-size: 20px;
    font-family: inherit;
  }

  .status-banner {
    text-align: center;
    padding: 14px;
    border-radius: 8px;
    font-size: 13.5px;
    margin-bottom: 20px;
    font-family: 'SF Mono', ui-monospace, monospace;
  }
  .status-banner.pending { background: rgba(200,155,60,0.1); color: var(--brass-light); border: 1px solid rgba(200,155,60,0.3); }
  .status-banner.safe { background: rgba(76,154,106,0.1); color: #8FCBA5; border: 1px solid rgba(76,154,106,0.3); }
  .status-banner.forfeit { background: rgba(181,84,74,0.12); color: #E5A69E; border: 1px solid rgba(181,84,74,0.35); }

  .note { font-size: 12px; color: var(--steel-light); line-height: 1.5; margin-top: 4px; }
</style>
<script>
(function(){
  const root = document.getElementById('app');
  let state = {
    screen: 'onboard',
    name: '',
    pledgeType: 'money',
    pledgeAmount: 25,
    pledgeAct: '',
    tasks: [
      { id: 1, name: 'Reply to unread emails', difficulty: 'easy', done: false },
      { id: 2, name: 'Gym session', difficulty: 'medium', done: false },
      { id: 3, name: 'Finish project outline', difficulty: 'hard', done: false },
    ],
    newTaskName: '',
    deadlinePassed: false,
  };

  function setState(patch){ state = Object.assign({}, state, patch); render(); }

  function checkIcon(){
    return '<svg viewBox="0 0 24 24" fill="none"><path d="M4 12l5 5L20 6" stroke="#0B1220" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  }

  function vaultSVG(pct, forfeited){
    const r = 70, c = 2*Math.PI*r;
    const offset = c - (pct/100)*c;
    const ringColor = forfeited ? '#B5544A' : (pct >= 100 ? '#4C9A6A' : '#C89B3C');
    return `
    <svg width="180" height="180" viewBox="0 0 180 180">
      <circle cx="90" cy="90" r="${r}" fill="none" stroke="#232F3F" stroke-width="10"/>
      <circle cx="90" cy="90" r="${r}" fill="none" stroke="${ringColor}" stroke-width="10"
        stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"
        transform="rotate(-90 90 90)" style="transition: stroke-dashoffset 0.4s ease, stroke 0.4s ease"/>
      <text x="90" y="97" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="${forfeited ? '#E5A69E' : '#EDE7DA'}">${Math.round(pct)}%</text>
    </svg>`;
  }

  function renderOnboard(){
    root.innerHTML = `
    <div class="wrap">
      <p class="eyebrow">Step 1 of 1 — Set your stake</p>
      <h1>Put something <span>real</span> on the line.</h1>
      <div class="card">
        <label>Your name</label>
        <input type="text" id="name" placeholder="e.g. Jordan" value="${state.name}"/>

        <label>What are you pledging?</label>
        <div class="toggle-row">
          <div class="toggle ${state.pledgeType==='money'?'active':''}" data-type="money">Money</div>
          <div class="toggle ${state.pledgeType==='act'?'active':''}" data-type="act">An act</div>
        </div>

        ${state.pledgeType === 'money' ? `
          <label>Amount at stake ($)</label>
          <input type="number" id="amount" min="1" value="${state.pledgeAmount}"/>
          <p class="note">This amount is held until your task period ends. Complete enough of your assigned tasks and it's returned. Miss the deadline and it's forfeited — in the full version, to a charity you'd rather not fund.</p>
        ` : `
          <label>The act you're pledging (if you fail)</label>
          <input type="text" id="act" placeholder="e.g. Post an embarrassing photo" value="${state.pledgeAct}"/>
          <p class="note">A designated referee — a friend you add — confirms whether the act happens.</p>
        `}

        <button class="primary" id="start-btn">Lock in stake &amp; continue</button>
      </div>
    </div>`;

    document.querySelectorAll('.toggle').forEach(el => {
      el.onclick = () => setState({ pledgeType: el.dataset.type });
    });
    document.getElementById('name').oninput = e => state.name = e.target.value;
    if (state.pledgeType === 'money') {
      document.getElementById('amount').oninput = e => state.pledgeAmount = Number(e.target.value) || 0;
    } else {
      document.getElementById('act').oninput = e => state.pledgeAct = e.target.value;
    }
    document.getElementById('start-btn').onclick = () => setState({ screen: 'dashboard' });
  }

  function renderDashboard(){
    const total = state.tasks.length;
    const doneCount = state.tasks.filter(t => t.done).length;
    const pct = total ? (doneCount/total)*100 : 0;
    const forfeited = state.deadlinePassed && pct < 100;
    const allDone = pct >= 100;

    let bannerClass = 'pending', bannerText = `${doneCount}/${total} tasks done — deadline still open`;
    if (forfeited) { bannerClass = 'forfeit'; bannerText = state.pledgeType === 'money'
        ? `Deadline passed. $${state.pledgeAmount} forfeited.`
        : `Deadline passed. Pledged act now due — your referee has been notified.`; }
    else if (allDone) { bannerClass = 'safe'; bannerText = state.pledgeType === 'money'
        ? `All tasks complete — $${state.pledgeAmount} returned to you.`
        : `All tasks complete — pledge released, nothing owed.`; }

    root.innerHTML = `
    <div class="wrap">
      <p class="eyebrow">Welcome back, ${state.name || 'friend'}</p>
      <h1>Your <span>vault</span></h1>

      <div class="card">
        <div class="dial-wrap">${vaultSVG(pct, forfeited)}</div>
        <div class="dial-caption">${doneCount} of ${total} tasks complete</div>

        <div class="stake-amount">${state.pledgeType === 'money' ? '$' + state.pledgeAmount : '—'}</div>
        <div class="stake-label">${state.pledgeType === 'money' ? 'at stake' : state.pledgeAct || 'act pledged'}</div>

        <div class="status-banner ${bannerClass}">${bannerText}</div>

        ${state.tasks.map(t => `
          <div class="task">
            <div class="check ${t.done ? 'done' : ''}" data-id="${t.id}">${t.done ? checkIcon() : ''}</div>
            <div class="task-name ${t.done ? 'done' : ''}">${t.name}</div>
            <div class="task-diff">${t.difficulty}</div>
          </div>
        `).join('')}

        <div class="add-task-row">
          <input type="text" id="new-task" placeholder="Add another task..." value="${state.newTaskName}"/>
          <button id="add-task-btn">+</button>
        </div>
      </div>

      <button class="ghost" id="simulate-btn">${state.deadlinePassed ? 'Reset simulation' : 'Simulate: deadline passes now'}</button>
      <p class="note" style="text-align:center; margin-top:14px;">MVP demo — no real payment is processed. Task completion here is self-reported; a production version would add lightweight verification (photo, referee, or integration check).</p>
    </div>`;

    document.querySelectorAll('.check').forEach(el => {
      el.onclick = () => {
        if (state.deadlinePassed) return;
        const id = Number(el.dataset.id);
        state.tasks = state.tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
        render();
      };
    });
    document.getElementById('new-task').oninput = e => state.newTaskName = e.target.value;
    document.getElementById('add-task-btn').onclick = () => {
      if (!state.newTaskName.trim()) return;
      state.tasks = state.tasks.concat([{ id: Date.now(), name: state.newTaskName.trim(), difficulty: 'medium', done: false }]);
      setState({ newTaskName: '' });
    };
    document.getElementById('simulate-btn').onclick = () => setState({ deadlinePassed: !state.deadlinePassed });
  }

  function render(){
    if (state.screen === 'onboard') renderOnboard();
    else renderDashboard();
  }

  render();
})();
</script>

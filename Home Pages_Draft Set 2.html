<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Draft Set 2 - Home Page</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');

  :root{
    --bg: #F6F6F1;
    --paper: #FFFFFF;
    --ink: #262620;
    --muted: #8A897E;
    --border: #E4E3DA;
    --accent: #2F6F63;
    --accent-soft: #E7F1EE;
  }

  *{ box-sizing: border-box; }

  body{
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.55;
  }

  .wrap{
    max-width: 680px;
    margin: 0 auto;
    padding: 88px 24px 96px;
  }

  .eyebrow{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 12px;
  }

  h1{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 38px;
    line-height: 1.1;
    margin: 0 0 40px;
    letter-spacing: -0.01em;
  }

  .card{
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 30px;
    box-shadow: 0 1px 2px rgba(20,20,15,0.04);
  }

  .card-label{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    margin: 0 0 14px;
  }

  .card ol{
    margin: 0;
    padding-left: 22px;
  }

  .card li{
    margin: 8px 0;
    font-size: 15.5px;
  }

  .next{
    margin-top: 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--accent-soft);
    border-radius: 12px;
    padding: 18px 24px;
    text-decoration: none;
    color: var(--ink);
    transition: background 0.15s ease;
  }

  .next:hover{ background: #dcebe6; }

  .next-label{
    font-size: 16px;
    font-weight: 600;
  }

  .next-arrow{
    font-family: 'IBM Plex Mono', monospace;
    color: var(--accent);
    font-size: 14px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">Draft Set 2</p>
    <h1>Draft Set 1 – Home Page</h1>

    <div class="card">
      <p class="card-label">Feedback for Draft 1.4</p>
      <ol>
        <li>Make a Cash Out option per every task</li>
        <li>Make group settings</li>
      </ol>
    </div>

    <a class="next" href="Draft-Set-2_Draft-2.0.html">
      <span class="next-label">Draft 2.0</span>
      <span class="next-arrow">&#8594;</span>
    </a>
  </div>
</body>
</html>
